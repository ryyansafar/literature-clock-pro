<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature Clock — Flip Disc Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="ledMatrix"></canvas>

    <!-- System Interface: Cinematic Hacker Console -->
    <div id="systemInterface">
        <div id="consoleHeader">
            <div class="status-indicator"></div>
            <span class="system-title">SYSTEM_CORE // LITERATURE_CLOCK_V2</span>
            <div class="system-actions">
                <button id="btnPower" class="action-btn power" onclick="window.togglePower()">
                    <span class="btn-icon">⏻</span> SYSTEM_OFF
                </button>
                <button id="btnReboot" class="action-btn reboot" onclick="window.rebootSequence()" disabled>
                    <span class="btn-icon">↻</span> REBOOT_CLK
                </button>
            </div>
        </div>
        
        <div id="consoleBody">
            <div class="log-container">
                <div id="bootLog"></div>
            </div>
            
            <div class="controls-panel">
                <div class="control-group">
                    <span class="ctrl-label">GRID_COLS</span>
                    <input type="number" id="inputCols" value="180" oninput="window.updateGridDimensions()">
                </div>
                <div class="control-group">
                    <span class="ctrl-label">GRID_ROWS</span>
                    <input type="number" id="inputRows" value="48" oninput="window.updateGridDimensions()">
                </div>
                <div id="dimReadout">
                    <div id="dimLEDs" class="dim-stat">—</div>
                    <div class="dim-label">DISCS_TOTAL</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
